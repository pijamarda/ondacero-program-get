name: Download La Brujula episode

on:
  schedule:
    # Runs Tuesday–Saturday at 08:00 UTC (Mon–Fri night episodes)
    - cron: "0 8 * * 2-6"
  workflow_dispatch:

jobs:
  scrape-and-upload:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Run scraper
        run: ./scraper.py

      - name: Upload to Dropbox
        env:
          DROPBOX_TOKEN: ${{ secrets.DROPBOX_TOKEN }}
        run: |
          uv run --with requests python - <<'EOF'
          import os, glob, requests

          token = os.environ["DROPBOX_TOKEN"]
          files = glob.glob("la-brujula-*.mp3")
          if not files:
              raise FileNotFoundError("No MP3 file found to upload")

          mp3 = files[0]
          dest = f"/data/ondacero/{os.path.basename(mp3)}"

          with open(mp3, "rb") as f:
              r = requests.post(
                  "https://content.dropboxapi.com/2/files/upload",
                  headers={
                      "Authorization": f"Bearer {token}",
                      "Dropbox-API-Arg": f'{{"path":"{dest}","mode":"overwrite","autorename":false}}',
                      "Content-Type": "application/octet-stream",
                  },
                  data=f,
              )
          r.raise_for_status()
          print(f"Uploaded: {r.json()['path_display']}")
          EOF
