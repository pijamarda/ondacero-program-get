name: Download La Brujula episode

on:
  schedule:
    # Runs Tuesday–Saturday at ~07:00 CEST / ~08:00 CET (Mon–Fri night episodes)
    # Off-minute (7) avoids GitHub's queued round-hour slots
    - cron: "7 5 * * 2-6"
  workflow_dispatch:

jobs:
  scrape-and-upload:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Run scraper
        run: ./scraper.py

      - name: Upload to Dropbox
        env:
          DROPBOX_APP_KEY: ${{ secrets.DROPBOX_APP_KEY }}
          DROPBOX_APP_SECRET: ${{ secrets.DROPBOX_APP_SECRET }}
          DROPBOX_REFRESH_TOKEN: ${{ secrets.DROPBOX_REFRESH_TOKEN }}
        run: |
          uv run --with requests python - <<'EOF'
          import os, glob, requests

          # Exchange refresh token for a fresh short-lived access token
          r = requests.post("https://api.dropbox.com/oauth2/token", data={
              "grant_type": "refresh_token",
              "refresh_token": os.environ["DROPBOX_REFRESH_TOKEN"],
              "client_id": os.environ["DROPBOX_APP_KEY"],
              "client_secret": os.environ["DROPBOX_APP_SECRET"],
          })
          r.raise_for_status()
          token = r.json()["access_token"]

          files = glob.glob("la-brujula-*.mp3")
          if not files:
              raise FileNotFoundError("No MP3 file found to upload")

          mp3 = files[0]
          dest = f"/data/ondacero/{os.path.basename(mp3)}"

          with open(mp3, "rb") as f:
              r = requests.post(
                  "https://content.dropboxapi.com/2/files/upload",
                  headers={
                      "Authorization": f"Bearer {token}",
                      "Dropbox-API-Arg": f'{{"path":"{dest}","mode":"overwrite","autorename":false}}',
                      "Content-Type": "application/octet-stream",
                  },
                  data=f,
              )
          r.raise_for_status()
          print(f"Uploaded: {r.json()['path_display']}")
          EOF
